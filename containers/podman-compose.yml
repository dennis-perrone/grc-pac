version: "3.9"

services:
  opa:
    image: openpolicyagent/opa:latest
    container_name: opa
    ports:
      - "8181:8181"
    volumes:
      - ../policies:/policies
    command:
      [
        "run",
        "--server",
        "--addr=0.0.0.0:8181",
        "--watch",
        "/policies"
      ]